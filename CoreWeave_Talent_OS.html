// ─── REDUCER ──────────────────────────────────────────────────────────────────
function reducer(state, action) {
  switch(action.type) {
    case "UPDATE": return { ...state, reqs: state.reqs.map(r => r.id === action.id ? { ...r, ...action.patch } : r) };
    case "ADD":    return { ...state, reqs: [action.req, ...state.reqs] };
    default:       return state;
  }
}

const Btn = ({ children, onClick, variant="primary", sm, disabled, loading, full, type="button", icon }) => {

    dark:    { background:P.charcoal,    color:"#fff",      border:"none"                                     },
    outline: { background:"transparent", color:P.lapis,     border:`1px solid ${a(P.lapis,0.35)}`             },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled||loading}
      style={{ display:"inline-flex", alignItems:"center", justifyContent:full?"center":"flex-start", gap:6, padding:sm?"6px 12px":"9px 18px",

      {children}
    </button>
  );
};

// ─── TOP BAR ──────────────────────────────────────────────────────────────────
const VIEW_TITLE = {
  dashboard:"Dashboard", submit:"New Request", pipeline:"Pipeline Board",
  priority:"Priority Queue", hrbp_q:"HR Review Queue", org_q:"Org Leader Queue",
  finance_q:"Finance Queue", assign_q:"Assign Recruiters", intake_q:"Intake Queue",
  ai_intake:"AI Intake Tool", sourcing:"Sourcing Board", analytics:"Analytics",
  budget:"Budget View", my_reqs:"My Requests", all_roles:"All Open Roles",
};

function TopBar({ persona, setPersona, view, ghConn, bhConn }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const p = PERSONAS[persona];

  useEffect(() => {
    if (!open) return;
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);

  return (
    <div style={{ background:"#fff", borderBottom:`1px solid ${P.mist}`, padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", height:54, flexShrink:0 }}>
      <div style={{ fontSize:16, fontWeight:700, color:P.charcoal }}>{VIEW_TITLE[view] || "Dashboard"}</div>
      <div ref={ref} style={{ position:"relative" }}>
        <button onClick={()=>setOpen(o=>!o)}
          style={{ display:"flex", alignItems:"center", gap:10, padding:"6px 12px", border:`1px solid ${P.mist}`, borderRadius:8, background:"#fff", cursor:"pointer", fontFamily:"inherit", transition:"border-color 0.1s" }}>
          <Avi initials={p.av} color={p.color} size={28} />
          <div style={{ textAlign:"left" }}>
            <div style={{ fontSize:12, fontWeight:700, color:P.charcoal }}>{p.name}</div>
            <div style={{ fontSize:10, color:P.slate }}>{p.role}</div>
          </div>
          <span style={{ fontSize:10, color:P.coolGray }}>▾</span>
        </button>
        {open && (
          <div style={{ position:"absolute", right:0, top:"calc(100% + 6px)", background:"#fff", border:`1px solid ${P.mist}`, borderRadius:10, boxShadow:`0 8px 32px ${a("#000",0.10)}`, zIndex:200, minWidth:270, overflow:"hidden" }}>
            <div style={{ padding:"10px 16px 6px", fontSize:10, fontWeight:700, color:P.slate, textTransform:"uppercase", letterSpacing:0.7 }}>Switch Persona</div>
            {Object.entries(PERSONAS).map(([k,u]) => (
              <button key={k} onClick={()=>{setPersona(k);setOpen(false);}}
                style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 16px",
                  background:persona===k?P.lapisLight:"transparent", border:"none", cursor:"pointer",
                  fontFamily:"inherit", textAlign:"left", borderLeft:`3px solid ${persona===k?P.lapis:"transparent"}`,
                  transition:"background 0.1s" }}>
                <Avi initials={u.av} color={u.color} size={28} />
                <div>
                  <div style={{ fontSize:12, fontWeight:persona===k?700:500, color:P.charcoal }}>{u.name}</div>
                  <div style={{ fontSize:10, color:P.slate }}>{u.role} · {u.dept}</div>
                </div>
                {persona===k && <span style={{ marginLeft:"auto", color:P.lapis, fontSize:14 }}>✓</span>}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APPROVAL MODAL ───────────────────────────────────────────────────────────
function ApprovalModal({ req, persona, onApprove, onReject, onClose }) {
  const [notes, setNotes] = useState("");
  const [busy,  setBusy]  = useState(false);

  const handle = async (type) => {
    setBusy(true);
    await new Promise(r=>setTimeout(r,700));
    type==="approve" ? onApprove(req.id,notes) : onReject(req.id,notes);
  };

  const ph = { hrbp:"e.g. Comp in band. IC5 confirmed. No concerns.", org_leader:"e.g. Approved. Critical Q2 dependency. Team has onboarding capacity.", finance:"e.g. Within Q2 budget. HC slot committed. Approved." }[persona]||"Add your notes…";
  const title = { hrbp:"HRBP Review — Emily Arney", org_leader:"Org Leader Review — Jeff Baker", finance:"Finance Review — Ian Woller" }[persona]||"Review";

  return (
    <div style={{ position:"fixed", inset:0, background:a("#0E1829",0.65), zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(3px)" }}>
      <Card noPad style={{ width:580, maxHeight:"88vh", overflow:"auto", borderRadius:14, boxShadow:`0 24px 60px ${a("#000",0.20)}` }}>
        <div style={{ background:P.charcoal, padding:"18px 22px", borderRadius:"14px 14px 0 0", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:"#fff", marginBottom:3 }}>{title}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{req.title} · {req.level} · {req.team}</div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.4)", fontSize:22, cursor:"pointer", lineHeight:1 }}>×</button>
        </div>
        <div style={{ padding:"22px 24px" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px 24px", marginBottom:16 }}>
            {[["Priority",<PrioTag p={req.priority} sm />],["Comp",`$${req.comp_min}K–$${req.comp_max}K`],["Openings",req.openings],["Start",req.start],["Location",req.location],["HM",req.hm]].map(([l,v])=>(
              <div key={l}>
                <div style={{ fontSize:9, fontWeight:700, color:P.slate, textTransform:"uppercase", letterSpacing:0.6, marginBottom:4 }}>{l}</div>
                <div style={{ fontSize:13, color:P.charcoal }}>{v}</div>
              </div>
            ))}
          </div>
          {req.overview && <div style={{ fontSize:12, color:P.midGray, background:P.calcite, borderRadius:7, padding:"10px 12px", marginBottom:14, lineHeight:1.7, border:`1px solid ${P.mist}` }}>{req.overview}</div>}
          {req.jd_url && <div style={{ marginBottom:14 }}><a href={req.jd_url} target="_blank" rel="noreferrer" style={{ fontSize:12, color:P.lapis, fontWeight:700, textDecoration:"none" }}>📄 View Job Description ↗</a></div>}
          {persona==="org_leader" && req.hrbp_notes && <div style={{ background:P.greenLight, border:`1px solid ${P.greenBorder}`, borderRadius:7, padding:"9px 13px", marginBottom:10, fontSize:11, fontWeight:600, color:P.green }}>✓ HRBP: {req.hrbp_notes}</div>}
          {persona==="finance" && req.hrbp_notes && <div style={{ background:P.greenLight, border:`1px solid ${P.greenBorder}`, borderRadius:7, padding:"9px 13px", marginBottom:8, fontSize:11, fontWeight:600, color:P.green }}>✓ HRBP: {req.hrbp_notes}</div>}
          {persona==="finance" && req.ol_notes && <div style={{ background:P.indigoLight, border:`1px solid ${a(P.indigo,0.25)}`, borderRadius:7, padding:"9px 13px", marginBottom:8, fontSize:11, fontWeight:600, color:P.indigo }}>✓ Org Leader: {req.ol_notes}</div>}
          <Divider />
          <label style={{ display:"block", fontSize:12, fontWeight:700, color:P.charcoal, marginBottom:7 }}>Approval Notes *</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder={ph}
            style={{ width:"100%", minHeight:90, border:`1px solid ${P.mist}`, borderRadius:7, padding:"10px 12px", fontSize:12, fontFamily:"inherit", color:P.charcoal, resize:"vertical", outline:"none", boxSizing:"border-box", lineHeight:1.6 }} />
          <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:16 }}>
            <Btn variant="danger" onClick={()=>handle("reject")} disabled={busy} sm>Return</Btn>
            <Btn onClick={()=>handle("approve")} disabled={busy||!notes.trim()} loading={busy} sm>Approve & Advance →</Btn>
          </div>
        </div>
      </Card>
    </div>
  );
}

          <div style={{ background:P.tealLight, border:`1px solid ${a(P.teal,0.25)}`, borderRadius:7, padding:"9px 13px", marginBottom:16, fontSize:11, color:P.teal, fontWeight:600 }}>
            ✓ HRBP · Org Leader · Finance all approved — AI intake doc will be ready immediately on assignment
          </div>

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────

            {req.intake_done && req.gh_id && <div style={{ background:P.greenLight, border:`1px solid ${P.greenBorder}`, borderRadius:7, padding:"10px 14px" }}><div style={{ fontSize:10, fontWeight:700, color:P.green }}>✓ Intake complete · {req.gh_id} · BrightHire live</div></div>}
          </div>
        </div>
        {/* Footer */}
        {hasAction && (
          <div style={{ padding:"14px 22px", borderTop:`1px solid ${P.mist}`, background:P.calcite, display:"flex", gap:10, justifyContent:"flex-end", flexShrink:0 }}>

            {can.assign && <Btn onClick={()=>{onClose();onAssign(req.id);}} icon="⚡">Assign Recruiter</Btn>}

// ─── AI INTAKE TOOL ───────────────────────────────────────────────────────────
const GLEAN_MCP = { type:"url", url:"https://coreweave-be.glean.com/mcp/default", name:"glean" };
const MODEL = "claude-sonnet-4-20250514";

async function callClaude({ system, user, mcp }) {
  const body = { model:MODEL, max_tokens:2200, messages:[{ role:"user", content:user }] };
  if (system) body.system = system;
  if (mcp)    body.mcp_servers = [GLEAN_MCP];
  const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  const data = await res.json();
  const text = (data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("\n");
  const tool = (data.content||[]).filter(c=>c.type==="mcp_tool_result").map(c=>c.content?.[0]?.text||"").join("\n");
  return { text: text||tool, raw:data };
}

function safeParse(text) {
  try { return JSON.parse(text.replace(/```json|```/g,"").trim()); }
  catch { return null; }
}

function IntakeTool({ req, onClose, onComplete, setGhConn, setBhConn }) {
  const [tab,       setTab]       = useState("form");
  const [form,      setFormState] = useState({
    title:req.title, level:req.level, dept:req.dept, team:req.team,
    overview:req.overview||"", mh:req.mh||"", tools:req.tools||"",
    comp_min:req.comp_min, comp_max:req.comp_max,
    location:req.location, work:req.work,
    hm:req.hm, hm_email:req.hm_email, org_leader:req.org_leader,
    gh_req_id: req.gh_req_id||"",
    sell:"CoreWeave is the only GPU-native cloud built from the ground up for AI workloads. No competing priorities, no retrofitting — pure AI infrastructure at the frontier of the market.",
    sourcing_strategy:"",
    interview_plan:[
      { stage:"Recruiter Screen (30 min)", interviewer:req.recruiter||"Cody Letchworth", focus:"Qualification, motivation, comp alignment, red flags" },
      { stage:"HM Interview (60 min)",     interviewer:req.hm,                           focus:"Leadership scope, strategic context, team fit" },
      { stage:"Technical/Domain (60 min)", interviewer:"Panel TBD",                      focus:"Technical depth, domain expertise, decision-making" },
      { stage:"Final / Culture (45 min)",  interviewer:"Senior Leader TBD",              focus:"Values alignment, career vision, executive presence" },

  });
  const [igData,    setIgData]    = useState(null);
  const [outreach,  setOutreach]  = useState(null);
  const [brief,     setBrief]     = useState(null);
  const [loading,   setLoading]   = useState({ jd:false, gh_lookup:false, ig:false, out:false, brief:false, gh_push:false });
  const [ghLog,     setGhLog]     = useState([]);
  const [ghDone,    setGhDone]    = useState(false);
  const [statusMsg, setStatusMsg] = useState("");

  const setField = useCallback((k,v) => setFormState(p=>({...p,[k]:v})), []);

  // ── Glean: Read JD from Google Drive ──────────────────────────────────────
  const readJD = async () => {
    if (!req.jd_url) return;
    setLoading(l=>({...l,jd:true})); setStatusMsg("📁 Reading JD from Google Drive via Glean…");
    try {
      const sys = `You are a senior TA partner at CoreWeave. Extract structured intake fields from the job description. Return ONLY valid JSON: { "title": string, "level": string, "overview": string, "mh": string, "tools": string, "sell": string, "comp_min": number, "comp_max": number }. No markdown fences.`;
      const { text } = await callClaude({ system:sys, user:`Read this Google Drive JD and extract all fields: ${req.jd_url}\n\nRole context: ${req.title} | ${req.level} | ${req.dept}`, mcp:true });
      const parsed = safeParse(text);
      if (parsed) {
        setFormState(p=>({ ...p, ...parsed, comp_min:parsed.comp_min||p.comp_min, comp_max:parsed.comp_max||p.comp_max }));
        setStatusMsg("✓ JD read via Glean — all fields auto-filled");
      } else {
        setStatusMsg("✓ Glean connected · Using submission data");
      }
    } catch { setStatusMsg("Glean read unavailable · Submission data in use"); }
    setLoading(l=>({...l,jd:false}));
  };

  // ── Glean: Look up Greenhouse req ID ──────────────────────────────────────
  const lookupGHReq = async () => {
    setLoading(l=>({...l,gh_lookup:true})); setStatusMsg("🌿 Searching Greenhouse via Glean for req ID…");
    try {
      const sys = `You have access to the CoreWeave Greenhouse ATS via Glean. Search for the job posting matching this title and return ONLY valid JSON: { "gh_req_id": string, "gh_url": string, "status": string }. The gh_req_id is the numeric ID in the Greenhouse dashboard URL (e.g. app6.greenhouse.io/sdash/4519260006 → "4519260006"). No markdown fences.`;
      const { text } = await callClaude({ system:sys, user:`Search Greenhouse for this job: "${req.title}" in ${req.dept}. HM: ${req.hm}. Return the req ID and dashboard URL.`, mcp:true });
      const parsed = safeParse(text);
      if (parsed?.gh_req_id) {
        setField("gh_req_id", parsed.gh_req_id);
        setStatusMsg(`✓ Found in Greenhouse — Req ID: ${parsed.gh_req_id}`);
      } else {
        setStatusMsg("No active GH req found — will create new on push");

    } catch { setStatusMsg("GH lookup unavailable — will create new on push"); }
    setLoading(l=>({...l,gh_lookup:false}));
  };

  // ── Generate interview guide ───────────────────────────────────────────────
  const genIG = async () => {
    setLoading(l=>({...l,ig:true})); setTab("ig"); setStatusMsg("🎯 Generating interview guide via Claude…");
    try {
      const sys = `You are a senior TA partner at CoreWeave. Generate a structured interview guide. Return ONLY valid JSON: { "stages": [{ "stage_name": string, "interviewer": string, "duration": string, "focus": string, "questions": [{ "q": string, "type": string, "competency": string, "rubric": { "s1": string, "s2": string, "s3": string, "s4": string } }] }] }. Generate 4-5 elite questions per stage calibrated to the interviewer's background. No markdown fences.`;
      const { text } = await callClaude({ system:sys, user:`Role: ${form.title} (${form.level}) | ${form.dept} | ${form.team}\nOverview: ${form.overview}\nMust-Haves: ${form.mh}\nTools: ${form.tools}\nInterview Plan: ${JSON.stringify(form.interview_plan)}` });
      const parsed = safeParse(text);
      if (parsed?.stages) { setIgData(parsed); setStatusMsg("✓ Interview guide generated"); }

    } catch {
      setIgData({ stages: form.interview_plan.map((s,i)=>({ stage_name:s.stage, interviewer:s.interviewer, duration:"45-60 min", focus:s.focus,
        questions:[{ q:`Walk me through a specific situation where you ${["navigated a complex technical challenge","drove a strategic cross-functional initiative","made a high-stakes prioritization decision","built alignment under significant pressure"][i%4]}. What was your approach, what did you decide, and what was the measurable outcome?`, type:"Behavioral", competency:"Impact & Ownership",
          rubric:{ s1:"Vague, no specifics — 'I handled it well'", s2:"Correct direction, limited depth on own reasoning", s3:"Clear story, concrete outcome, shows decision logic", s4:"Demonstrates mastery — teaches the interviewer something new" } }] })) });

  // ── Greenhouse push ────────────────────────────────────────────────────────
  const pushToGH = async () => {

    const ghId = form.gh_req_id ? `GH-${form.gh_req_id.slice(-4)}` : `GH-${Math.floor(4500+Math.random()*200)}`;

    setGhDone(true); setGhConn(true); setBhConn(true);
    setLoading(l=>({...l,gh_push:false}));
  };

  // ── Generate outreach ──────────────────────────────────────────────────────
  const genOutreach = async () => {
    setLoading(l=>({...l,out:true})); setTab("outreach"); setStatusMsg("✉️ Writing outreach sequences…");
    try {
      const sys = `You are an expert sourcer at CoreWeave focused on AI infrastructure talent. Return ONLY valid JSON: { "inmail": { "subject": string, "body": string }, "gem_recruiter": [{ "step": number, "subject": string, "body": string }], "gem_hm": { "subject": string, "body": string } }. LinkedIn InMail 140-180 words, specific not generic. Gem 4 steps. HM-behalf: peer tone, first person. No markdown fences.`;
      const { text } = await callClaude({ system:sys, user:`Role: ${form.title} (${form.level}) | ${form.dept}\nOverview: ${form.overview}\nHM: ${form.hm}\nSell: ${form.sell}\nMust-haves: ${form.mh}` });
      const parsed = safeParse(text);
      if (parsed?.inmail) { setOutreach(parsed); setStatusMsg("✓ All 3 outreach formats ready"); }
      else throw new Error("parse fail");
    } catch {
      setOutreach({ inmail:{ subject:`${form.title} @ CoreWeave — AI infra at scale`, body:`Hi [Name],\n\nI lead talent for CoreWeave — the only GPU-native cloud built exclusively for AI. We're hiring a ${form.title} to ${form.overview?.slice(0,80)||"drive impact"}.\n\nYour background in [relevant area] caught my attention. This is a rare opportunity to work at the infrastructure layer of the AI revolution.\n\nOpen to a 20-min call? Happy to share comp range upfront.\n\nBest,\n${form.hm?.split(" ")[0]||"Cody"}` },
        gem_recruiter:[{ step:1, subject:`CoreWeave — building the foundation of AI`, body:`Hey [Name] — CoreWeave trains models for OpenAI, Cohere, and others. Hiring a ${form.title} now.` },{ step:2, subject:`Re: the ${form.title} role`, body:`You'd be owning [specific scope] from day one. Different from typical cloud roles.` },{ step:3, subject:`Still open — moving quickly`, body:`This is moving to final stages. Wanted to flag before we close.` },{ step:4, subject:`Leaving this here`, body:`Last note — my door is open whenever timing works. Great things happening here.` }],
        gem_hm:{ subject:`Building something — ${form.title}`, body:`Hi [Name],\n\nI'm ${form.hm} at CoreWeave. Building out my team and think you'd be a great fit for what we're working on. Would love 20 minutes.\n\n${form.hm}` } });

      const sys = `You are a senior TA partner at CoreWeave. Return ONLY valid JSON: { "summary": string, "ideal_profile": string, "green_flags": string[], "red_flags": string[], "sourcing_strategy": string, "interview_tips": string, "hm_context": string, "comp_context": string }. No markdown fences.`;
      const { text } = await callClaude({ system:sys, user:`Role: ${form.title} (${form.level}) | ${form.dept}\nHM: ${form.hm} | OL: ${form.org_leader}\nOverview: ${form.overview}\nMust-haves: ${form.mh}\nSell: ${form.sell}` });
      const parsed = safeParse(text);

        interview_tips:"Focus on depth over breadth. Probe for specific decisions owned, not just participated in. Look for candidates who teach you something.",

        comp_context:`$${form.comp_min}K–$${form.comp_max}K base. Equity competitive vs. public tech. Share range early — saves cycles.` });
      setStatusMsg("✓ Brief ready (demo mode)");

    setLoading(l=>({...l,brief:false}));

  const exportScorecard = () => {

<h1>BrightHire Scorecard — ${form.title}</h1><p>${form.level} · ${form.dept} · ${form.team} · HM: ${form.hm} · ${new Date().toLocaleDateString()}</p>
${stages.map(s=>`<div class="stage"><div class="st">${s.stage_name}</div><div class="si">Interviewer: ${s.interviewer}</div>${(s.questions||[]).map((q,i)=>`<div class="q"><div class="qt">${i+1}. ${q.q}</div><div style="font-size:11px;color:#747283">Type: ${q.type} · Competency: ${q.competency}</div>${q.rubric?`<div class="rubric"><div class="ri s1">⭐ Weak: ${q.rubric.s1}</div><div class="ri s2">⭐⭐ Developing: ${q.rubric.s2}</div><div class="ri s3">⭐⭐⭐ Strong: ${q.rubric.s3}</div><div class="ri s4">⭐⭐⭐⭐ Exceptional: ${q.rubric.s4}</div></div>`:""}<div class="signal">📝 Notes: _______________________________________</div></div>`).join("")}</div>`).join("")}

<div class="footer">⚡ Import via BrightHire Chrome Extension → Import All Notes. Scorecard Autodraft pre-fills from your recording.</div></body></html>`;
    const blob = new Blob([html],{type:"text/html"});

  const TABS = [
    { id:"form",     label:"📋 Intake Form",    action:{ label:"✦ Read JD via Glean", fn:readJD,      loading:loading.jd,       disabled:!req.jd_url } },
    { id:"ig",       label:"🎯 Interview Guide", action:{ label:"✦ Generate Guide",   fn:genIG,       loading:loading.ig       } },
    { id:"outreach", label:"✉️ Outreach",       action:{ label:"✦ Generate Outreach", fn:genOutreach, loading:loading.out      } },
    { id:"brief",    label:"📊 Recruiter Brief", action:{ label:"✦ Generate Brief",   fn:genBrief,    loading:loading.brief    } },
    { id:"gh",       label:"🌿 GH Push",        action:null },

  const activeTab = TABS.find(t=>t.id===tab);

  return (
    <div style={{ position:"fixed", inset:0, background:a("#0E1829",0.72), zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)" }}>
      <div style={{ width:"min(1140px,96vw)", height:"92vh", background:"#fff", borderRadius:16, overflow:"hidden", display:"flex", flexDirection:"column", boxShadow:`0 40px 100px ${a("#000",0.35)}` }}>
        {/* Header */}
        <div style={{ background:P.charcoal, padding:"14px 24px", display:"flex", alignItems:"center", gap:14, flexShrink:0 }}>

        <div style={{ display:"flex", borderBottom:`1px solid ${P.mist}`, background:"#fff", flexShrink:0 }}>

            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{ padding:"12px 20px", border:"none", borderBottom:`2px solid ${tab===t.id?P.lapis:"transparent"}`, background:"transparent", cursor:"pointer", fontFamily:"inherit", fontSize:13, fontWeight:tab===t.id?700:400, color:tab===t.id?P.lapis:P.slate, whiteSpace:"nowrap", transition:"color 0.1s" }}>
              {t.label}
              {t.id==="gh" && ghDone && <span style={{ marginLeft:6, fontSize:10, color:P.green }}>✓</span>}

          {tab==="form" && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22 }}>
              <div>
                <div style={{ fontSize:11, fontWeight:800, color:P.lapis, textTransform:"uppercase", letterSpacing:0.8, marginBottom:14 }}>Role Details</div>
                {[["Job Title","title","text"],["Level","level","text"],["Department","dept","text"],["Team","team","text"],["HM Name","hm","text"],["Org Leader","org_leader","text"],["Comp Min ($K)","comp_min","number"],["Comp Max ($K)","comp_max","number"],["Location","location","text"],["Work Style","work","text"]].map(([l,k,t])=>(

// ─── PIPELINE BOARD ───────────────────────────────────────────────────────────
function Pipeline({ reqs, onSelect }) {
  const COLS = [
    { label:"In Approval",         color:P.amber,  statuses:["submitted","hrbp_approved","org_approved"] },
    { label:"Assignment / Intake", color:P.lapis,  statuses:["ta_queue","intake"] },
    { label:"Active Search",       color:P.indigo, statuses:["sourcing","interviewing"] },
    { label:"Closing",             color:P.green,  statuses:["offer","filled"] },
  ];
  return (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:16 }}>
      {COLS.map(col => {
        const items = reqs.filter(r=>col.statuses.includes(r.status));
        return (
          <div key={col.label}>
            <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:12 }}>
              <div style={{ width:8, height:8, borderRadius:99, background:col.color }} />
              <div style={{ fontSize:12, fontWeight:700, color:P.charcoal }}>{col.label}</div>
              <div style={{ background:P.cloud, border:`1px solid ${P.mist}`, color:P.slate, fontSize:10, fontWeight:700, padding:"1px 7px", borderRadius:99, marginLeft:"auto" }}>{items.length}</div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:8, minHeight:120 }}>
              {items.map(r=>(
                <div key={r.id} onClick={()=>onSelect(r.id)}
                  style={{ background:"#fff", border:`1px solid ${P.mist}`, borderRadius:8, padding:"12px 14px", cursor:"pointer", transition:"all 0.1s" }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=P.lapis;e.currentTarget.style.boxShadow=`0 2px 8px ${a(P.lapis,0.10)}`;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=P.mist;e.currentTarget.style.boxShadow="none";}}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <PrioTag p={r.priority} sm /><StatusTag s={r.status} sm />
                  </div>
                  <div style={{ fontSize:12, fontWeight:700, color:P.charcoal, lineHeight:1.3, marginBottom:4 }}>{r.title}</div>
                  <div style={{ fontSize:10, color:P.slate }}>{r.level} · {r.team}</div>
                  {r.candidates>0  && <div style={{ fontSize:10, color:P.purple, fontWeight:600, marginTop:5 }}>👤 {r.candidates} in pipeline</div>}
                  {r.days_open>30  && <div style={{ fontSize:10, color:P.red, fontWeight:700, marginTop:3 }}>⚠ {r.days_open}d open</div>}
                  {r.gh_id && <div style={{ fontSize:10, color:P.ghGreen, fontWeight:600, marginTop:3 }}>🌿 {r.gh_id}</div>}
                </div>
              ))}
              {!items.length && <div style={{ textAlign:"center", padding:"20px 10px", fontSize:11, color:P.coolGray, border:`1px dashed ${P.mist}`, borderRadius:8 }}>No roles</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── TA: AI INTAKE FULL VIEW (dedicated tab) ──────────────────────────────────

  return (
    <div>
      {/* Hero banner */}
      <div style={{ background:P.charcoal, borderRadius:12, padding:"22px 26px", marginBottom:24, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontSize:20, fontWeight:800, color:"#fff", marginBottom:6 }}>✦ AI Intake Tool</div>

        </div>
        <div style={{ display:"flex", gap:10, flexShrink:0 }}>

          </div>

              <Card style={{ borderRadius:"10px 10px 0 0", marginBottom:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                    <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:5 }}>

                    </div>
                    <div style={{ fontSize:11, color:P.slate }}>

                  <div style={{ display:"flex", gap:8 }}>

              {/* Context strip */}

// ─── ANALYTICS ────────────────────────────────────────────────────────────────
function Analytics({ reqs, persona }) {
  const active = reqs.filter(r=>!["draft","filled"].includes(r.status));
  const byDept = {};
  reqs.forEach(r=>{
    if(!byDept[r.dept]) byDept[r.dept]={open:0,p0:0,stuck:0};
    if(!["filled","draft"].includes(r.status)) byDept[r.dept].open++;
    if(r.priority==="P0") byDept[r.dept].p0++;
    if(["submitted","hrbp_approved","org_approved"].includes(r.status)) byDept[r.dept].stuck++;
  });

  const personaMetrics = {
    ta: [["My Reqs",reqs.filter(r=>r.recruiter==="Cody Letchworth").length,"Active",P.lapis],["In Sourcing",reqs.filter(r=>r.recruiter==="Cody Letchworth"&&r.status==="sourcing").length,"Reqs sourcing",P.indigo],["Candidates",reqs.filter(r=>r.recruiter==="Cody Letchworth").reduce((s,r)=>s+r.candidates,0),"In pipeline",P.purple],["Intake Done",reqs.filter(r=>r.recruiter==="Cody Letchworth"&&r.intake_done).length,"Configured",P.green]],
    hrbp: [["Reviewed",reqs.filter(r=>r.hrbp_notes).length,"HRBP approved",P.green],["Pending",reqs.filter(r=>r.status==="submitted").length,"Awaiting review",P.amber],["P0 Roles",reqs.filter(r=>r.priority==="P0").length,"Critical",P.red],["Total Active",active.length,"In pipeline",P.charcoal]],
    finance: [["Approved",reqs.filter(r=>r.fin_notes).length,"Budget committed",P.teal],["Pending",reqs.filter(r=>r.status==="org_approved").length,"Awaiting sign-off",P.amber],["HC Slots Used",reqs.filter(r=>["ta_queue","intake","sourcing","interviewing","offer","filled"].includes(r.status)).length,"Of "+Q2.total+" Q2",P.lapis],["Comp Exposure",`$${Math.round(reqs.filter(r=>!["draft","filled"].includes(r.status)).reduce((s,r)=>s+(r.comp_min+r.comp_max)/2*r.openings,0)/1000)}K`,"Total pipeline",P.charcoal]],
    rec_lead: [["Team Reqs",active.length,"Across all recruiters",P.charcoal],["In Sourcing",reqs.filter(r=>r.status==="sourcing").length,"Active search",P.indigo],["Interviewing",reqs.filter(r=>r.status==="interviewing").length,"In process",P.purple],["Total Candidates",reqs.reduce((s,r)=>s+r.candidates,0),"In pipeline",P.lapis]],
  };
  const kpis = personaMetrics[persona] || personaMetrics.rec_lead;

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:22 }}>

      <Card style={{ marginBottom:18 }}>
        <div style={{ fontSize:14, fontWeight:700, color:P.charcoal, marginBottom:16 }}>Pipeline by Department</div>
        {Object.entries(byDept).map(([dept,data])=>(
          <div key={dept} style={{ display:"grid", gridTemplateColumns:"110px 1fr 60px 60px 90px", alignItems:"center", gap:14, marginBottom:12 }}>
            <div style={{ fontSize:12, fontWeight:700, color:P.charcoal }}>{dept}</div>
            <div style={{ background:P.cloud, borderRadius:99, height:6, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${Math.min((data.open/7)*100,100)}%`, background:P.lapis }} />
            </div>
            <div style={{ fontSize:11, color:P.slate }}>{data.open} open</div>
            <div style={{ fontSize:10, color:data.p0>0?P.red:P.coolGray, fontWeight:data.p0>0?700:400 }}>{data.p0>0?`${data.p0} P0`:""}</div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12 }}>

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [state,          dispatch]         = useReducer(reducer, { reqs: SEED });
  const [persona,        setPersona]       = useState("ta");
  const [view,           setView]          = useState("dashboard");
  const [selectedId,     setSelectedId]    = useState(null);
  const [approvalTarget, setApprovalTarget]= useState(null);
  const [assignTarget,   setAssignTarget]  = useState(null);
  const [intakeId,       setIntakeId]      = useState(null);
  const [showSubmit,     setShowSubmit]    = useState(false);
  const [demoStep,       setDemoStep]      = useState(null);
  const [toast,          setToast]         = useState(null);
  const [ghConn,         setGhConn]        = useState(false);
  const [bhConn,         setBhConn]        = useState(false);

  const { reqs } = state;

  const showToast = useCallback((msg, type="success") => {
    setToast({ msg, type });
    setTimeout(()=>setToast(null), 4200);
  }, []);

  const upd = (id, patch) => dispatch({ type:"UPDATE", id, patch });

  const pending = {
    hrbp:   reqs.filter(r=>r.status==="submitted"),
    org:    reqs.filter(r=>r.status==="hrbp_approved"),
    fin:    reqs.filter(r=>r.status==="org_approved"),
    assign: reqs.filter(r=>r.status==="ta_queue"),
    intake: reqs.filter(r=>r.status==="intake"&&!r.intake_done),
  };

  const doApprove = (id, notes) => {
    const req = reqs.find(r=>r.id===id); if(!req) return;
    if(persona==="hrbp")       { upd(id,{status:"hrbp_approved",hrbp_notes:notes}); showToast(`HRBP approved → routing to ${req.org_leader}`); }
    if(persona==="org_leader") { upd(id,{status:"org_approved",ol_notes:notes});    showToast("Org Leader approved → Ian Woller will review the budget"); }
    if(persona==="finance")    { upd(id,{status:"ta_queue",fin_notes:notes});       showToast("Finance approved — HC slot committed. Joy notified. AI Intake doc ready."); }
    setApprovalTarget(null); setSelectedId(null);
  };

  const doReject = (id, notes) => {
    if(persona==="hrbp")       upd(id,{status:"submitted",   hrbp_notes:notes});
    if(persona==="org_leader") upd(id,{status:"hrbp_approved",ol_notes:notes});
    if(persona==="finance")    upd(id,{status:"org_approved", fin_notes:notes});
    showToast("Returned with notes — visible in submission queue","error");
    setApprovalTarget(null); setSelectedId(null);
  };

  const doAssign = (id, rec) => {
    upd(id,{status:"intake",recruiter:rec,assigned_by:"Joy Embry"});
    showToast(`${rec} assigned → AI Intake Tool ready. JD pre-loaded.`);
    setAssignTarget(null);
  };

  const completeIntake = (id, ghId) => {
    upd(id,{status:"sourcing",intake_done:true,gh_id:ghId});
    setIntakeId(null);
    showToast(`✦ Intake complete · ${ghId} in Greenhouse · BrightHire live · Sourcing started`);
  };

  const submitReq = (data) => {
    const id = `HC-0${70+reqs.length}`;
    dispatch({ type:"ADD", req:{ id, status:"submitted", submitted:new Date().toISOString().slice(0,10), recruiter:null, assigned_by:null, gh_id:null, gh_req_id:null, candidates:0, days_open:0, hrbp_notes:null, ol_notes:null, fin_notes:null, intake_done:false, backfill:false, tools:"", work:"Hybrid 3x", ...data }});
    setShowSubmit(false); setView("dashboard");
    showToast(`${id} submitted → Emily Arney (HRBP) notified`);
  };

  const switchPersona = (p) => { setPersona(p); setView("dashboard"); setSelectedId(null); setApprovalTarget(null); };
  const handleNav     = (v) => { if(v==="submit"){setShowSubmit(true);}else{setShowSubmit(false);} setView(v); };

  const selected  = reqs.find(r=>r.id===selectedId)  || null;
  const intakeReq = reqs.find(r=>r.id===intakeId)    || null;
  const assignReq = reqs.find(r=>r.id===assignTarget) || null;

  const PRIO_ORDER = ["P0","P1","P2"];
  const sortedReqs = [...reqs].filter(r=>r.status!=="filled").sort((a,b)=>PRIO_ORDER.indexOf(a.priority)-PRIO_ORDER.indexOf(b.priority)||b.days_open-a.days_open);

  // ── Persona dashboards ────────────────────────────────────────────────────
  const renderDashboard = () => {
    const p = persona;

    // ── HM Dashboard ──
    if(p==="hm") {
      const myReqs = reqs.filter(r=>r.hm===PERSONAS.hm.name&&r.status!=="draft");
      const inFlow  = myReqs.filter(r=>["submitted","hrbp_approved","org_approved"].includes(r.status));
      const inTA    = myReqs.filter(r=>["ta_queue","intake","sourcing","interviewing","offer"].includes(r.status));
      return (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:24 }}>
            <Kpi label="My Open Reqs"  value={myReqs.length}  sub="Total submitted"  accent={P.charcoal} icon="📋" />
            <Kpi label="In Approvals"  value={inFlow.length}  sub="Moving through chain" accent={P.amber}    icon="⏳" />
            <Kpi label="With Recruiting" value={inTA.length}  sub="TA is sourcing"   accent={P.lapis}    icon="🔍" onClick={()=>setView("pipeline")} />
            <Kpi label="Offer / Final" value={myReqs.filter(r=>["offer","filled"].includes(r.status)).length} sub="In closing" accent={P.green} icon="🎯" />
          </div>
          <Section title="My Active Requests" sub="Click any role to view the approval trail and pipeline status"

      return (

        </Section>
        {myReqs.filter(r=>["sourcing","interviewing","offer"].includes(r.status)).length>0 && (
          <Section title="My Active Pipeline">
            {myReqs.filter(r=>["sourcing","interviewing","offer"].includes(r.status)).map(r=><ReqRow key={r.id} req={r} onClick={()=>setSelectedId(r.id)} />)}

  const queueFor = {

    finance_q: { color:P.teal,   msg:"Full approval chain complete. Your sign-off commits the HC slot and notifies TA" },
    assign_q:  { color:P.purple, msg:"AI intake doc auto-generates on assignment. Recruiter is sourcing-ready in minutes" },
    intake_q:  { color:P.lapis,  msg:"JD pre-loaded from Google Drive. Click Open Intake Tool to build and launch" },

  if (showSubmit) return (
    <div style={{ display:"flex", height:"100vh", fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif", background:P.calcite, overflow:"hidden" }}>
      <Sidebar persona={persona} view="submit" setView={handleNav} reqs={reqs} onDemo={()=>{setShowSubmit(false);setDemoStep(0);}} ghConn={ghConn} bhConn={bhConn} />

                  </div>

                  )}
                  {["hrbp_q","org_q","finance_q"].includes(view) && (
                    <div style={{ background:P.amberLight, border:`1px solid ${P.amberBorder}`, borderRadius:"0 0 10px 10px", padding:"9px 16px", marginTop:-7, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ fontSize:11, color:P.amber, fontWeight:600 }}>{view==="hrbp_q"?"Awaiting HR review":view==="org_q"?"HRBP ✓ — awaiting strategic sign-off":"HRBP + OL ✓ — awaiting budget approval"}</div>
                      <Btn sm onClick={()=>{setSelectedId(null);setApprovalTarget(r);}}>Review & Approve →</Btn>
                    </div>
                  )}
                </div>
              )) : <EmptyState icon="✓" title="Queue clear" sub="Nothing waiting for action right now." />}
            </Section>
          )}

          {/* TA ONLY: Dedicated AI Intake Tab */}
          {view==="ai_intake" && persona==="ta" && (
            <AIIntakeView reqs={reqs} onOpenIntake={setIntakeId} myName={PERSONAS.ta.name} />
          )}

          {view==="sourcing" && (
            <Section title="Sourcing Board" sub="Active candidate search — outreach is live. Target: qualified candidates to HM within 14 days.">
              <div style={{ background:P.lapisLight, border:`1px solid ${a(P.lapis,0.22)}`, borderRadius:8, padding:"10px 16px", marginBottom:16, fontSize:12, color:P.lapis, fontWeight:600 }}>
                Finance TTH benchmark: <strong>43 days</strong> · Target first submit: <strong>14 days</strong> · LinkedIn InMail + Gem sequences + HM-behalf active
              </div>
              {reqs.filter(r=>["sourcing","interviewing","offer"].includes(r.status)).map(r=><ReqRow key={r.id} req={r} onClick={()=>setSelectedId(r.id)} />)}
            </Section>
          )}

          {view==="analytics" && <Section title="Analytics"><Analytics reqs={reqs} persona={persona} /></Section>}

          {view==="budget" && (
            <Section title="Budget View" sub="Q2 2026 headcount utilization — live">
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:20 }}>
                {(()=>{
                  const committed = reqs.filter(r=>["ta_queue","intake","sourcing","interviewing","offer","filled"].includes(r.status)).length;
                  const inApproval = reqs.filter(r=>["submitted","hrbp_approved","org_approved"].includes(r.status)).length;
                  return [["Q2 Slots",Q2.total,"Total released",P.charcoal],["Committed",committed,"Budget allocated",P.lapis],["In Approval",inApproval,"Pending sign-off",P.amber],["Available",Q2.total-committed-inApproval,"Unallocated",P.green]].map(([l,v,s,c])=><Kpi key={l} label={l} value={v} sub={s} accent={c} />);
                })()}
              </div>
              <Card>
                <div style={{ fontSize:14, fontWeight:700, color:P.charcoal, marginBottom:4 }}>Q2 2026 — Accounting HC (Ian Woller)</div>
                <div style={{ fontSize:11, color:P.slate, marginBottom:16 }}>135 total · 99 filled Q1 · 36 released Q2 · Source: Finance HC Tracker</div>
                {(()=>{
                  const active = reqs.filter(r=>["ta_queue","intake","sourcing","interviewing","offer"].includes(r.status)).length;
                  const inAppr = reqs.filter(r=>["submitted","hrbp_approved","org_approved"].includes(r.status)).length;
                  return (<>
                    <div style={{ height:16, background:P.cloud, borderRadius:99, overflow:"hidden", display:"flex", marginBottom:14 }}>
                      <div style={{ width:`${(Q2.filled/Q2.total)*100}%`, background:P.green }} />
                      <div style={{ width:`${(active/Q2.total)*100}%`, background:P.lapis }} />
                      <div style={{ width:`${(inAppr/Q2.total)*100}%`, background:a(P.amber,0.55) }} />
                    </div>
                    <div style={{ display:"flex", gap:20, fontSize:12 }}>
                      {[["Filled Q2",Q2.filled,P.green],["In Recruiting",active,P.lapis],["In Approval",inAppr,P.amber]].map(([l,v,c])=>(
                        <div key={l} style={{ display:"flex", alignItems:"center", gap:7 }}><div style={{ width:12, height:12, borderRadius:3, background:c }} /><span>{l}: <strong>{v}</strong></span></div>
                      ))}
                    </div>
                  </>);
                })()}
              </Card>
            </Section>
          )}

          {view==="all_roles" && (
            <Section title="All Open Roles" sub={`${reqs.filter(r=>r.status!=="draft").length} roles in system`}>
              {reqs.filter(r=>r.status!=="draft").map(r=><ReqRow key={r.id} req={r} onClick={()=>setSelectedId(r.id)} />)}
            </Section>
          )}
        </div>
      </div>

      {/* Overlays */}
      {selected && <DetailPanel req={selected} persona={persona} onClose={()=>setSelectedId(null)}
        onApprove={req=>{setSelectedId(null);setApprovalTarget(req);}}
        onReject={req=>{setSelectedId(null);setApprovalTarget(req);}}
        onAssign={id=>{setSelectedId(null);setAssignTarget(id);}}
        onOpenIntake={id=>{setSelectedId(null);setIntakeId(id);}} />}
      {approvalTarget && <ApprovalModal req={approvalTarget} persona={persona} onApprove={doApprove} onReject={doReject} onClose={()=>setApprovalTarget(null)} />}
      {assignTarget && assignReq && <AssignModal req={assignReq} onAssign={doAssign} onClose={()=>setAssignTarget(null)} />}
      {intakeId && intakeReq && <IntakeTool req={intakeReq} onClose={()=>setIntakeId(null)} onComplete={completeIntake} setGhConn={setGhConn} setBhConn={setBhConn} />}
      {demoStep!==null && <DemoOverlay step={demoStep} onNext={()=>setDemoStep(s=>Math.min(s+1,DEMO_STEPS.length-1))} onPrev={()=>setDemoStep(s=>Math.max(s-1,0))} onClose={()=>setDemoStep(null)} />}
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      <style>{CSS}</style>
    </div>
  );
}

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CDCED6; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #A6A6B4; }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes blink    { 50% { opacity: 0; } }
  @keyframes slideUp  { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  input, select, textarea, button { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  button:focus-visible { outline: 2px solid #4665FF; outline-offset: 2px; }
  input:focus, select:focus, textarea:focus {
    border-color: #4665FF !important;
    box-shadow: 0 0 0 3px rgba(70,101,255,0.12) !important;
    outline: none;
  }
  a { text-decoration: none; }
`;


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
